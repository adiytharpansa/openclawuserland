name: CI - Continuous Integration

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  NODE_VERSION: '22'

jobs:
  # ========== CLI Tests ==========
  cli-test:
    name: CLI Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Lint
        run: npm run lint

      - name: 🧪 Run tests
        run: npm test || echo "No tests defined"

  # ========== Flutter Tests ==========
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: 🔍 Analyze code
        working-directory: flutter_app
        run: flutter analyze

      - name: 🧪 Run tests
        working-directory: flutter_app
        run: flutter test

  # ========== Build Verification ==========
  build-verify:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [cli-test, flutter-test]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: 🏗️ Build debug APK (verification only)
        working-directory: flutter_app
        run: flutter build apk --debug

      - name: ✅ Build successful
        run: echo "✅ Build verification passed!"

  # ========== Security Scan ==========
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔒 Run npm audit
        run: npm audit --audit-level=moderate || echo "npm audit found issues"

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: 🔒 Run dart pub audit
        working-directory: flutter_app
        run: flutter pub get && dart pub outdated || echo "Audit check completed"

  # ========== Code Quality ==========
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: 🔍 Run flutter analyze
        working-directory: flutter_app
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: 📊 Generate coverage (if tests exist)
        working-directory: flutter_app
        run: |
          flutter test --coverage || echo "No tests for coverage"
          
      - name: 📈 Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          files: flutter_app/coverage/lcov.info
          fail_ci_if_error: false

  # ========== Notify Results ==========
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [cli-test, flutter-test, build-verify, security-scan, code-quality]
    if: always()
    
    steps:
      - name: 📊 Check job statuses
        run: |
          echo "CLI Test: ${{ needs.cli-test.result }}"
          echo "Flutter Test: ${{ needs.flutter-test.result }}"
          echo "Build Verify: ${{ needs.build-verify.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"
          
          if [[ "${{ needs.cli-test.result }}" == "failure" || \
                "${{ needs.flutter-test.result }}" == "failure" || \
                "${{ needs.build-verify.result }}" == "failure" ]]; then
            echo "❌ Some critical checks failed!"
            exit 1
          else
            echo "✅ All checks passed!"
          fi
